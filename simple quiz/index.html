<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple JS quiz app">
  <title>Simple Quiz</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <h1 class="center3">Hello there! My name is Moralis. What's your name? </h1>

  <div class="center2">
    <img class="center2" src="./img/img2.jpg"  alt="">
  </div>

  <script>
    setTimeout(() => {
      let candName = prompt('Enter your name')
      localStorage.setItem('candName', candName);
      location.assign('./quiz.html');
    }, 1500)
  </script>
  <script src="./app.js"></script>
</body>
</html>
