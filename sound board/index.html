<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sound board">
  <meta name="author" content="Francisco">
  <title>Sound Board</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div>
    <button id="applauseBtn" onclick="playSound(this.id)">Applause<audio src="./sounds/applause.mp3" id="applause"></audio></button>
    <button id="booBtn" onclick="playSound(this.id)">Boo<audio src="./sounds/boo.mp3" id="boo"></audio></button>
    <button id="gaspBtn" onclick="playSound(this.id)">Gasp<audio src="./sounds/gasp.mp3" id="gasp"></audio></button>
    <button id="tadaBtn" onclick="playSound(this.id)">Tada<audio src="./sounds/tada.mp3" id="tada"></audio></button>
    <button id="victoryBtn" onclick="playSound(this.id)">Victory<audio src="./sounds/victory.mp3" id="victory"></audio></button>
    <button id="wrongBtn" onclick="playSound(this.id)">Wrong<audio src="./sounds/wrong.mp3" id="wrong"></audio></button>
  </div>

  <script src="./app.js"></script>
</body>
</html>
